  <script>
    async function loadHead() {
      try {
        const response = await fetch('Assets/head.html');
        const text = await response.text();
        
        // Create a temporary DOM to parse the string
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const newNodes = Array.from(doc.head.childNodes);

        for (const node of newNodes) {
          if (node.tagName === 'SCRIPT') {
            // Re-create script tags so they actually execute
            const script = document.createElement('script');
            Array.from(node.attributes).forEach(attr => script.setAttribute(attr.name, attr.value));
            script.textContent = node.textContent;
            document.head.appendChild(script);
          } else {
            // Standard tags (link, meta, title) can just be appended
            document.head.appendChild(node);
          }
        }
      } catch (err) {
        console.error('Failed to load head:', err);
      }
    }

    loadHead();
  </script>
